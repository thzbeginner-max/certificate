<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Certificate</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#e9e9e9;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family: Georgia, serif;
        }

        .certificate-btn{
            background:#3070bf;
            color:white;
            display:inline-block;
            border:none;
            padding:10px 30px;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            text-decoration:none;
            box-shadow:0 2px 5px rgba(0,0,0,0.2);
            transition:0.2s;
        }

        .certificate-btn:hover{
            opacity:0.95;
        }
    </style>
</head>
<body>

<a class="certificate-btn"
href="https://drive.google.com/file/d/1S-LgjXQiJFdDH7GQCZI-wJtBrSrVaS5W/view?usp=drive_link"
target="_blank">

    Course Certificate

</a>

</body>
</html>
